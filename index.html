<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quran Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title">Quran Player</h1>
    </header>

    <div class="controls">
      <div class="select-group">
        <label for="surah-select">Surah</label>
        <select id="surah-select"></select>
      </div>
      <div class="select-group">
        <label for="reciter-select">Reciter</label>
        <select id="reciter-select"></select>
      </div>
      <div class="select-group">
        <label for="translation-select">Translation</label>
        <select id="translation-select"></select>
      </div>
    </div>

    <main class="main">
      <div class="surah-header" id="surah-header">
        <h2 class="surah-name-arabic" id="surah-name-arabic"></h2>
        <h3 class="surah-name-english" id="surah-name-english"></h3>
        <p class="surah-info" id="surah-info"></p>
      </div>

      <div class="verse-display" id="verse-display">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Loading surah...</p>
        </div>
        <div class="error-message" id="error-message" style="display:none;">
          <p id="error-text">Failed to load data.</p>
          <button class="btn btn-retry" id="retry-btn">Retry</button>
        </div>
        <div class="verse-content" id="verse-content" style="display:none;">
          <div class="bismillah" id="bismillah" style="display:none;">
            <p class="bismillah-text">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
          </div>
          <p class="verse-arabic" id="verse-arabic" dir="rtl"></p>
          <span class="verse-number-badge" id="verse-number"></span>
          <p class="verse-translation" id="verse-translation"></p>
        </div>
      </div>

      <div class="player-controls" id="player-controls">
        <div class="progress-container" id="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="player-buttons">
          <button class="btn btn-nav" id="prev-surah-btn" title="Previous Surah">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
            </svg>
          </button>
          <button class="btn btn-nav" id="prev-btn" title="Previous Verse">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
            </svg>
          </button>
          <button class="btn btn-play" id="play-btn" title="Play">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="play-icon">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="pause-icon" style="display:none;">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <button class="btn btn-nav" id="next-btn" title="Next Verse">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
            </svg>
          </button>
          <button class="btn btn-nav" id="next-surah-btn" title="Next Surah">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
        </div>
        <div class="verse-indicator" id="verse-indicator">Verse 1 of 7</div>
      </div>

      <div class="verse-list-header">
        <h4>All Verses</h4>
      </div>
      <div class="verse-list" id="verse-list"></div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
